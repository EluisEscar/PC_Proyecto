# Blueprint de infraestructura como código para Render.
# Define la API (contenedor Docker) y la base de datos PostgreSQL gestionada.
services:
  - type: web
    name: limpiaparabrisas-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: limpiaparabrisas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        sync: false # se define con la URL del frontend en Vercel

databases:
  - name: limpiaparabrisas-db
    plan: free
    databaseName: limpiaparabrisas
    postgresMajorVersion: 16
